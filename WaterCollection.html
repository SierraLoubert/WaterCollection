<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water - Landscape Collector</title>
    <style>
        :root {
            --clean-blue: #003366;
            --dirty-yellow: #d4ac0d;
            --charity-button-yellow: #FFC907;
            --frame-border: #1A1A1A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #f0f3f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Device Game Window Frame */
        #game-frame {
            width: 100%;
            max-width: 440px;
            height: 80vh;
            max-height: 700px;
            background-color: #000;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            position: relative;
            overflow: hidden;
            border: 6px solid var(--frame-border);
        }

        /* Top HUD Bar */
        #hud-bar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* Layered System Screens */
        .game-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            z-index: 20;
        }

        /* Welcome Screen Styling */
        #welcome-screen {
            background: linear-gradient(to bottom, #111, #2c3e50);
            color: white;
        }

        #welcome-screen h1 {
            color: #3498db;
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #welcome-screen p {
            margin-bottom: 35px;
            line-height: 1.6;
            color: #bdc3c7;
            font-size: 1.05rem;
        }

        /* Game Over Screen (Strictly White Background) */
        #end-screen {
            background-color: white;
            color: #2c3e50;
            display: none;
        }

        #end-screen h2 {
            font-size: 2.3rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        #end-screen p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* Action Buttons */
        .yellow-action-btn {
            background-color: var(--charity-button-yellow);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
            text-transform: uppercase;
        }

        .yellow-action-btn:active {
            transform: scale(0.96);
        }

        /* Game Arena with African Landscape CSS */
        #game-arena {
            width: 100%;
            height: 100%;
            position: relative;
            /* African Sunset Gradient */
            background: linear-gradient(to bottom, #d35400 0%, #e67e22 40%, #f1c40f 80%, #34495e 100%);
        }

        /* Ground Horizon Silhouette */
        #game-arena::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12%;
            background-color: #1e1105;
            z-index: 1;
        }

        /* Acacia Tree Silhouette Overlay */
        .landscape-silhouette {
            position: absolute;
            bottom: 11%;
            right: -20px;
            width: 180px;
            height: 160px;
            background: #1e1105;
            clip-path: polygon(45% 100%, 50% 60%, 20% 40%, 5% 30%, 0% 15%, 35% 20%, 50% 40%, 75% 30%, 95% 10%, 100% 25%, 80% 45%, 55% 60%, 52% 100%);
            opacity: 0.9;
            pointer-events: none;
            z-index: 1;
        }
        
        .landscape-canopy {
            position: absolute;
            bottom: 23%;
            right: 10px;
            width: 220px;
            height: 35px;
            background: #1e1105;
            border-radius: 50% 50% 30% 30%;
            opacity: 0.9;
            pointer-events: none;
            z-index: 2;
        }

        /* Droplet Blueprint Styling */
        .droplet-wrapper {
            position: absolute;
            width: 55px;
            height: 55px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0);
            animation: grow-in 0.25s forwards cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        @keyframes grow-in {
            to { transform: scale(1); }
        }

        /* CSS Teardrop Shape Configuration */
        .droplet-mesh {
            width: 32px;
            height: 32px;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .blue-clean .droplet-mesh {
            background: linear-gradient(135deg, #77A8BB, var(--clean-blue));
            border: 2px solid #ebf5fb;
        }

        .yellow-dirty .droplet-mesh {
            background: linear-gradient(135deg, #FFF7E1, var(--dirty-yellow));
            border: 2px solid #fef9e7;
        }

        /* Feedback Overlays */
        #damage-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(231, 76, 60, 0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            transition: opacity 0.1s ease;
        }

        .splash-particle {
            position: absolute;
            border: 3px solid #5dade2;
            border-radius: 50%;
            pointer-events: none;
            z-index: 6;
            animation: ripple 0.35s forwards ease-out;
        }

        @keyframes ripple {
            0% { width: 5px; height: 5px; opacity: 1; transform: translate(-50%, -50%); }
            100% { width: 70px; height: 70px; opacity: 0; transform: translate(-50%, -50%); }
        }

        /* Logo Styles */
        .top-left-logo {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            z-index: 50;
            pointer-events: none;
        }

        .finish-screen-logo {
              width: 160px;
              height: 107px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div id="game-frame">
        <img src="imgs/logo.png" alt="Logo" class="top-left-logo" />
        <div id="hud-bar">
            <div>Score: <span id="score-val">0</span></div>
            <div>Time: <span id="timer-val">120</span>s</div>
        </div>

        <div id="damage-flash"></div>

        <div id="game-arena">
            <div class="landscape-silhouette"></div>
            <div class="landscape-canopy"></div>
        </div>

        <div id="welcome-screen" class="game-screen">
            <h1>Water Collector</h1>
            <p>Help protect communities. Tap the clean blue droplets to gain points. Avoid clicking the contaminated yellow water droplets.</p>
            <button class="yellow-action-btn" onclick="initiateGame()">Start Game</button>
        </div>

        <div id="end-screen" class="game-screen">
            <img src="imgs/logo.png" alt="Logo" class="finish-screen-logo" />
            <h2 id="end-status-heading">Success!</h2>
            <p id="end-status-body">You helped provide clean water!</p>
            <p style="margin-bottom: 25px;">Final Score: <strong id="end-score-val">0</strong></p>
            <button class="yellow-action-btn" onclick="restartCycle()">Play Again</button>
        </div>
    </div>

    <script>
        let currentScore = 0;
        let clockCounter = 120;
        let liveGameLoop;
        let isSessionActive = false;

        const gameArena = document.getElementById('game-arena');
        const scoreTracker = document.getElementById('score-val');
        const timerTracker = document.getElementById('timer-val');
        const flashScreen = document.getElementById('damage-flash');

        function initiateGame() {
            document.getElementById('welcome-screen').style.display = 'none';
            isSessionActive = true;
            currentScore = 0;
            clockCounter = 120;
            
            scoreTracker.innerText = currentScore;
            timerTracker.innerText = clockCounter;

            // Generate initial drop configurations matrix
            for (let i = 0; i < 4; i++) spawnElementNode('blue-clean');
            for (let i = 0; i < 3; i++) spawnElementNode('yellow-dirty');

            // Set background timer logic loop
            liveGameLoop = setInterval(() => {
                clockCounter--;
                timerTracker.innerText = clockCounter;

                if (clockCounter <= 0) {
                    evaluateGameResult(false);
                }
            }, 1000);
        }

        function spawnElementNode(variantClass) {
            if (!isSessionActive) return;

            const wrapper = document.createElement('div');
            wrapper.classList.add('droplet-wrapper', variantClass);

            const mesh = document.createElement('div');
            mesh.classList.add('droplet-mesh');
            wrapper.appendChild(mesh);

            // Compute valid inner coordinate parameters
            const boundaryX = Math.random() * (gameArena.clientWidth - 65) + 5;
            const boundaryY = Math.random() * (gameArena.clientHeight - 150) + 65;

            wrapper.style.left = `${boundaryX}px`;
            wrapper.style.top = `${boundaryY}px`;

            wrapper.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Optimizes mobile response delays
                processTargetHit(variantClass, wrapper, boundaryX, boundaryY);
            });

            wrapper.addEventListener('mousedown', (e) => {
                processTargetHit(variantClass, wrapper, boundaryX, boundaryY);
            });

            gameArena.appendChild(wrapper);
        }

        function processTargetHit(variant, nodeInstance, coordinatesX, coordinatesY) {
            if (!isSessionActive) return;

            if (variant === 'blue-clean') {
                currentScore += 10;
                scoreTracker.innerText = currentScore;
                generateSplashFX(coordinatesX + 27, coordinatesY + 27);
                nodeInstance.remove();
                spawnElementNode('blue-clean');

                if (currentScore >= 100) {
                    evaluateGameResult(true);
                }
            } else if (variant === 'yellow-dirty') {
                currentScore = Math.max(0, currentScore - 5);
                scoreTracker.innerText = currentScore;
                executeFlashFX();
            }
        }

        function generateSplashFX(posX, posY) {
            const particle = document.createElement('div');
            particle.classList.add('splash-particle');
            particle.style.left = `${posX}px`;
            particle.style.top = `${posY}px`;
            gameArena.appendChild(particle);
            setTimeout(() => particle.remove(), 350);
        }

        function executeFlashFX() {
            flashScreen.style.opacity = '1';
            setTimeout(() => flashScreen.style.opacity = '0', 120);
        }

        function evaluateGameResult(victoryCondition) {
            isSessionActive = false;
            clearInterval(liveGameLoop);
            
            // Clean dynamic interface elements out
            const activeDrops = gameArena.querySelectorAll('.droplet-wrapper');
            activeDrops.forEach(drop => drop.remove());

            const screenOverlay = document.getElementById('end-screen');
            const statusHeading = document.getElementById('end-status-heading');
            const statusBody = document.getElementById('end-status-body');
            
            document.getElementById('end-score-val').innerText = currentScore;

            if (victoryCondition) {
                statusHeading.innerText = "Success!";
                statusBody.innerText = "You helped provide clean water!";
                statusHeading.style.color = "var(--clean-blue)";
            } else {
                statusHeading.innerText = "Time's Up!";
                statusBody.innerText = "Try Again.";
                statusHeading.style.color = "#e74c3c";
            }

            screenOverlay.style.display = 'flex';
        }

        function restartCycle() {
            document.getElementById('end-screen').style.display = 'none';
            initiateGame();
        }
    </script>
</body>
</html>
